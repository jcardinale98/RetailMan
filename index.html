<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Página Super Básica</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 50px;
            background-color: #f0f0f0;
        }
        h1 {
            color: #333;
        }
        p {
            color: #666;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>¡Hola Mundo!</h1>
    <p>Esta es una página web super básica hecha solo con HTML y CSS.</p>
    <button onclick="alert('¡Hola! Gracias por visitar.')">
        Haz clic aquí
    </button>
</body>
</html>
